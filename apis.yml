        url: https://www.zoho.com/books/api/v3/apicollection/
  - aid: zoho:zoho-invoice
    name: Zoho Invoice
    description: >-
      The Zoho Invoice API allows you to perform all the operations that you
      do with the web client. It is built using REST principles and supports
