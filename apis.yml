apis:
  - aid: zoho:zoho-inventory
    name: Zoho Inventory
    description: >-
      The Zoho Inventory API allows you to perform all the operations that you
      do with our web client. It is built using REST principles which ensures
      predictable URLs for accessing resources, and uses HTTP response codes
      to indicate API errors.
    humanURL: https://www.zoho.com/inventory/api/v1/introduction/
    tags:
      - Inventory
      - Warehouse
      - Stock
    properties:
      - type: Documentation
        url: https://www.zoho.com/inventory/api/v1/introduction/
  - aid: zoho:zoho-crm
    name: Zoho CRM
    description: >-
      The Zoho CRM API provides REST endpoints and client libraries for Java,
      PHP, Python, and Node.js, allowing developers to integrate CRM data with
      third-party applications. It includes asynchronous APIs for bulk data
      operations and CRM Object Query Language (COQL) for SQL-style queries.
    humanURL: https://www.zoho.com/crm/developer/docs/api/
    tags:
      - CRM
      - Sales
      - Leads
      - Contacts
    properties:
      - type: Documentation
        url: https://www.zoho.com/crm/developer/docs/api/
      - type: API Reference
        url: https://www.zoho.com/crm/developer/docs/api/v8/
      - type: SDKs
        url: https://www.zoho.com/crm/developer/api.html
      - type: Getting Started
        url: https://www.zoho.com/crm/developer/docs/
  - aid: zoho:zoho-books
    name: Zoho Books
    description: >-
      The Zoho Books API allows you to perform all the operations that you do
      with the web client. It is built using REST principles which ensures
      predictable URLs for accessing resources, and uses HTTP response codes
