    properties:
      - type: Documentation
        url: https://www.zoho.com/invoice/api/v3/introduction/
  - aid: zoho:zoho-billing
    name: Zoho Billing
    description: >-
      The Zoho Billing API allows you to perform all operations from the web
      client and is built using REST principles. It supports managing
      subscriptions, plans, customers, invoices, and payment processing
      programmatically.
    humanURL: https://www.zoho.com/billing/api/v1/introduction/
