        url: https://www.zoho.com/billing/api/v1/apicollection/
  - aid: zoho:zoho-expense
    name: Zoho Expense
    description: >-
      The Zoho Expense API allows you to manage expenses, expense reports,
      receipts, trips, and users programmatically. It is built using REST
      principles and supports integration with third-party applications.
    humanURL: https://www.zoho.com/expense/api/v1/introduction/
    tags:
      - Expense Management
      - Receipts
      - Trips
    properties:
      - type: Documentation
        url: https://www.zoho.com/expense/api/v1/introduction/
      - type: Authentication
        url: https://www.zoho.com/expense/api/v1/authentication/
  - aid: zoho:zoho-desk
    name: Zoho Desk
    description: >-
      The Zoho Desk API provides REST endpoints to integrate your help desk
      with third-party applications. It supports managing tickets, contacts,
      accounts, and includes webhook support for event-driven notifications.
    humanURL: https://desk.zoho.com/DeskAPIDocument
    tags:
      - Help Desk
      - Customer Support
      - Tickets
    properties:
      - type: Documentation
        url: https://desk.zoho.com/DeskAPIDocument
      - type: Developer Portal
        url: https://www.zoho.com/desk/developers/
  - aid: zoho:zoho-people
    name: Zoho People
    description: >-
      The Zoho People API allows you to integrate HR modules with third-party
      applications, extracting employee data and form data in XML or JSON
      format. It is independent of programming languages and available in
      Essential HR, Professional, Premium, and Enterprise plans.
    humanURL: https://www.zoho.com/people/api/overview.html
    tags:
      - Human Resources
      - HR
      - Employees
    properties:
      - type: Documentation
        url: https://www.zoho.com/people/api/overview.html
  - aid: zoho:zoho-recruit
    name: Zoho Recruit
    description: >-
      The Zoho Recruit API provides REST endpoints with JSON format and OAuth2.0
      authentication for integrating recruitment modules with third-party
      applications. It supports managing candidates, job openings, contacts,
      interviews, and assessments, with asynchronous APIs for bulk operations.
    humanURL: https://www.zoho.com/recruit/developer-guide/apiv2/
    tags:
      - Recruitment
      - HR
      - Hiring
      - Candidates
    properties:
      - type: Documentation
        url: https://www.zoho.com/recruit/developer-guide/apiv2/
  - aid: zoho:zoho-projects
    name: Zoho Projects
    description: >-
      The Zoho Projects API allows you to understand and integrate Zoho Projects
      service with third-party applications, managing projects, tasks, time
      tracking, documents, and more programmatically through REST endpoints.
    humanURL: https://projects.zoho.com/api-docs
    tags:
      - Project Management
      - Tasks
      - Time Tracking
    properties:
      - type: Documentation
        url: https://projects.zoho.com/api-docs
      - type: Getting Started
        url: https://www.zoho.com/projects/help/rest-api/projects-api.html
  - aid: zoho:zoho-mail
    name: Zoho Mail
    description: >-
      The Zoho Mail REST API allows developers to fetch email conversations
      and integrate Zoho Mail into applications, managing accounts, folders,
      labels, messages, signatures, threads, and organizational policies.
    humanURL: https://www.zoho.com/mail/help/api/overview.html
    tags:
      - Email
      - Mail
      - Messaging
    properties:
      - type: Documentation
        url: https://www.zoho.com/mail/help/api/overview.html
