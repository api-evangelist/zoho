      data, as well as manage forms and reports programmatically.
    humanURL: https://www.zoho.com/creator/help/api/v2.1/
    tags:
      - Low-Code
      - Application Development
      - Custom Apps
    properties:
      - type: Documentation
        url: https://www.zoho.com/creator/help/api/v2.1/
