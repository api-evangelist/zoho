      applications for managing campaigns, contacts, and marketing automation.
    humanURL: https://www.zoho.com/campaigns/help/developers/
    tags:
      - Email Marketing
      - Campaigns
      - Marketing Automation
    properties:
      - type: Documentation
        url: https://www.zoho.com/campaigns/help/developers/
