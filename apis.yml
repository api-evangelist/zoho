    humanURL: https://www.zoho.com/sign/api/
    tags:
      - E-Signatures
      - Documents
      - Signing
    properties:
      - type: Documentation
        url: https://www.zoho.com/sign/api/
  - aid: zoho:zoho-analytics
    name: Zoho Analytics
    description: >-
      The Zoho Analytics API is built using REST principles and provides
      programmatic access to data, reports, and dashboards. It supports data
      import, export in multiple formats, and offers SDKs for Java, C#,
      Python, PHP, Go, and Node.js.
    humanURL: https://www.zoho.com/analytics/api/v2/introduction.html
    tags:
      - Analytics
      - Business Intelligence
      - Reporting
    properties:
      - type: Documentation
        url: https://www.zoho.com/analytics/api/v2/introduction.html
